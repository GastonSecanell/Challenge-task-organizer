services:
  mysql:
    image: mysql:8.0
    container_name: task_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_organizer
      MYSQL_USER: task_user
      MYSQL_PASSWORD: passwordtaskorganizer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - task_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: task_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./organizer-backend:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: task_organizer
      DB_USERNAME: task_user
      DB_PASSWORD: passwordtaskorganizer
    depends_on:
      - mysql
    networks:
      - task_network

  nginx:
    image: nginx:stable-alpine
    container_name: task_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./organizer-backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - task_network

  frontend:
    build:
      context: ./organizer-frontend
      dockerfile: ../docker/node/Dockerfile
    container_name: task_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./organizer-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - nginx
    networks:
      - task_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: task_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - task_network

networks:
  task_network:
    driver: bridge

volumes:
  mysql_data: